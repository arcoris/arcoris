## ARCORIS Issue Form: Feature Request
## Use this template for repository-relevant product improvements that do not require RFC-level design review.

name: "Feature Request"
description: "Propose a scoped product improvement for ARCORIS"
title: "[Feature]: "
labels:
  - "kind/feature"
  - "needs-triage"
body:
  - type: "markdown"
    attributes:
      value: |
        Use this form for scoped product improvements that are concrete enough to triage as work.

        Do not use this form for usage questions, support, or broad design brainstorming. Use GitHub Discussions for those topics.

        If the request changes architecture, control-plane semantics, extension contracts, or compatibility behavior in a substantial way, use the Design Proposal form instead.

  - type: "checkboxes"
    id: "preflight"
    attributes:
      label: "Before submitting"
      options:
        - label: "I searched existing issues, discussions, and proposals for the same request"
          required: true
        - label: "I am describing the problem and desired outcome, not only a preferred implementation"
          required: true
        - label: "This request does not require RFC-level architecture or compatibility review"
          required: true
        - label: "I removed sensitive data and internal-only references"
          required: true

  - type: "dropdown"
    id: "request-class"
    attributes:
      label: "Request class"
      options:
        - "New capability"
        - "Operational ergonomics"
        - "Performance or efficiency"
        - "Observability or debugging"
        - "Adapter or integration improvement"
        - "API, CLI, or configuration UX"
        - "Other"
    validations:
      required: true

  - type: "dropdown"
    id: "area"
    attributes:
      label: "Affected subsystem"
      description: "Select every subsystem that would be touched."
      multiple: true
      options:
        - "Admission control"
        - "Scheduling / dispatch"
        - "Rate control / concurrency regulation"
        - "Workload isolation / fairness"
        - "Overload protection / shedding"
        - "Workers / execution / leases / retries"
        - "Queue / broker adapters"
        - "Control plane / policy distribution"
        - "Coordination / cluster state"
        - "Observability / metrics / tracing / logging"
        - "API / CLI / configuration schema"
        - "Deployment / Kubernetes / Helm / CI"
        - "Documentation"
        - "Other / needs triage"
    validations:
      required: true

  - type: "textarea"
    id: "problem-statement"
    attributes:
      label: "Problem being solved"
      description: "Describe the operator, workload, or platform problem that exists today."
    validations:
      required: true

  - type: "textarea"
    id: "current-limitation"
    attributes:
      label: "Why current behavior is insufficient"
      description: "Explain what ARCORIS cannot do today, or why current behavior is too costly, risky, or awkward."
    validations:
      required: true

  - type: "textarea"
    id: "use-case"
    attributes:
      label: "Concrete use case"
      description: "Describe the workload, operational flow, or integration scenario that motivates the request."
    validations:
      required: true

  - type: "textarea"
    id: "desired-outcome"
    attributes:
      label: "Desired outcome"
      description: "Describe the user-visible or operator-visible outcome that should become possible."
    validations:
      required: true

  - type: "textarea"
    id: "impact"
    attributes:
      label: "Expected user or operator impact"
      description: "State who benefits and what measurable or practical improvement you expect."
    validations:
      required: true

  - type: "textarea"
    id: "suggested-direction"
    attributes:
      label: "Suggested direction"
      description: "If you have one, describe a candidate approach or prior art. Keep this high-level."
    validations:
      required: false

  - type: "textarea"
    id: "alternatives"
    attributes:
      label: "Alternatives considered"
      description: "List current workarounds or other approaches and why they are insufficient."
    validations:
      required: false

  - type: "textarea"
    id: "success-criteria"
    attributes:
      label: "Success criteria"
      description: "Describe the observable conditions that would make this request complete."
    validations:
      required: true

  - type: "textarea"
    id: "compatibility"
    attributes:
      label: "Compatibility and rollout considerations"
      description: "Note any expected API, CLI, configuration, migration, or rollout considerations."
    validations:
      required: false

  - type: "dropdown"
    id: "contributor-intent"
    attributes:
      label: "Contributor intent"
      options:
        - "I plan to implement or contribute code"
        - "I can help refine the design or validate behavior"
        - "I am reporting the need only"
    validations:
      required: true

  - type: "textarea"
    id: "references"
    attributes:
      label: "References"
      description: "Link related issues, proposals, benchmarks, or external systems if they strengthen the request."
    validations:
      required: false
