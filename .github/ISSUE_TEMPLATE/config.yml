## ARCORIS issue chooser configuration.
## Contact links are part of governance: keep them aligned with the actual community and security reporting paths.

blank_issues_enabled: false

contact_links:
  - name: "Private security reporting"
    url: "https://github.com/ARCORIS/arcoris/security"
    about: "Report vulnerabilities, leaked credentials, or other sensitive security issues privately. Do not open a public issue for security matters."

  - name: "Questions, support, and design discussion"
    url: "https://github.com/ARCORIS/arcoris/discussions"
    about: "Use Discussions for how-to questions, deployment help, workload tuning, troubleshooting without a confirmed defect, and open-ended design discussion."

  - name: "Project overview and repository documentation"
    url: "https://github.com/ARCORIS/arcoris#readme"
    about: "Read the README and repository documentation before filing an issue. Use the Documentation Issue form for defects in repository docs."
